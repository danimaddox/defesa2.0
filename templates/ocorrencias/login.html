<!DOCTYPE html>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login - Defesa Civil</title>

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Rubik', sans-serif;
  background: linear-gradient(135deg, #ff9800, #f57c00);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.card {
  width:360px;
  padding:35px;
  border-radius:16px;
  background:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

h3 {
  text-align:center;
  color:#fb8c00;
  margin-bottom:25px;
}

.form-control {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:5px;
}

.input-group {
  display:flex;
}

.input-group button {
  margin-left:5px;
  border:none;
  background:#ff9800;
  color:white;
  border-radius:10px;
  padding:0 12px;
  cursor:pointer;
}

.btn-primary {
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:#fb8c00;
  color:white;
  font-size:1em;
  cursor:pointer;
  transition:0.3s;
}

.btn-primary:hover {
  background:#f57c00;
}

.alert {
  background:#ffebee;
  color:#c62828;
  padding:10px;
  border-radius:8px;
  margin-bottom:15px;
}

.footer {
  text-align:center;
  margin-top:15px;
  font-size:0.8em;
  color:#999;
}
</style>
</head>

<body>

<div class="card">
  <h3> Cadastro e Análise de Ocorrências - Defesa Civil</h3>

  {% if messages %}
    {% for message in messages %}
      <div class="alert">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post" id="loginForm">
    {% csrf_token %}

    <label>Usuário</label>
    <input type="text" name="username" id="username" class="form-control" required>

    <label>Senha</label>
    <div class="input-group">
      <input type="password" name="password" id="password" class="form-control" required>
      <button type="button" id="togglePassword">👁</button>
    </div>

    <button type="submit" class="btn-primary">Entrar</button>
  </form>

  <div class="footer">
    Sistema de Ocorrências
  </div>
   <div class="footer">
   <p>&copy; 2026 UNIVESP - PROJETO INTEGRADOR EM COMPUTAÇÃO I , II e III - Todos os direitos reservados</p>
 </div>

<script>
document.getElementById("togglePassword").addEventListener("click", function() {
  let senha = document.getElementById("password");
  senha.type = senha.type === "password" ? "text" : "password";
});
</script>

</body>

</html>
